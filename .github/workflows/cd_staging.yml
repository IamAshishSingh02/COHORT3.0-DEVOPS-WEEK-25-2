name: Deploy to staging

on:
  push:
    branches: ['main']

jobs: 
  redeploy_everything:
    name: Deploy the everything to the staging cluster
    runs-on: ubuntu-latest

    steps: 
      - name: Checkout the code
        uses: actions/checkout@v2

      - name: SSH into the server
        uses: appleboy/ssh-action@v1
        with: 
          host: 15.206.204.93
          username: ubuntu
          key: ${{ secrets.PRIVATE_SSH_KEY }}
          port: 22
          script: |
            set -e
            export NVM_DIR="/home/ubuntu/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
             
            cd COHORT3.0-DEVOPS-WEEK-25-2/ 
            git fetch origin main
            if [ -n "$(git status --porcelain)" ]; then
              git stash push --include-untracked -m "pre-deploy-$(date -u +%Y%m%dT%H%M%SZ)"
            fi
            git reset --hard origin/main
            pnpm install --frozen-lockfile
            pnpm run build
            test -f ecosystem.config.js
            pm2 startOrRestart "$(pwd)/ecosystem.config.js" --update-env
            pm2 save
